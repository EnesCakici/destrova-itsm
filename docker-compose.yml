version: '3.8'

services:
  postgres-db:
    image: postgres:15
    container_name: ticket_postgres
    environment:
      POSTGRES_USER: ticket_user
      POSTGRES_PASSWORD: ticket_password
      POSTGRES_DB: ticket_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: ticket_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ticket.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres-db

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: ticket-keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-db:5432/ticket_db
      KC_DB_USERNAME: ticket_user
      KC_DB_PASSWORD: ticket_password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"
    depends_on:
      - postgres-db

  mailhog:
    image: mailhog/mailhog
    container_name: mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep -q Zookeeper"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  kafka:
    image: confluentinc/cp-kafka:7.7.7
    container_name: kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 6
      start_period: 40s

  opensearch:
    image: opensearchproject/opensearch:2
    container_name: opensearch
    environment:
      discovery.type: single-node
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: S3cur3Pass!
      plugins.security.disabled: "true"
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  otel-collector:
    image: otel/opentelemetry-collector-contrib
    container_name: otel-collector
    command: ["--config", "/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"
    depends_on:
      opensearch:
        condition: service_healthy
    restart: unless-stopped

#backend kısmı kodları vardı, sildim şimdilik masaüstünde duruyor ekleyeceğim

  # CP-58: Create destrova-logs index with explicit mapping (idempotent: HTTP 200 or 400 if exists)
  opensearch-init:
    image: curlimages/curl:8.5.0
    container_name: opensearch-init
    depends_on:
      opensearch:
        condition: service_healthy
    volumes:
      - ./backend/src/main/resources/opensearch/destrova-logs-mapping.json:/mapping.json:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        HTTP_CODE=$$(curl -sS -o /tmp/body -w "%{http_code}" -X PUT "http://opensearch:9200/destrova-logs" \
          -H "Content-Type: application/json" --data-binary @/mapping.json)
        if [ "$$HTTP_CODE" = "200" ] || [ "$$HTTP_CODE" = "400" ]; then exit 0; fi
        cat /tmp/body >&2
        exit 1
    restart: "no"

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2
    container_name: opensearch-dashboards
    depends_on:
      opensearch:
        condition: service_healthy
      opensearch-init:
        condition: service_completed_successfully
    environment:
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
      OPENSEARCH_HOSTS: "http://opensearch:9200"
    ports:
      - "5601:5601"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5601/app/login >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 90s

volumes:
  postgres_data:
  opensearch-data: