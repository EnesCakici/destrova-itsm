services:
  postgres-db:
    image: postgres:15
    container_name: ticket_postgres
    environment:
      POSTGRES_USER: ticket_user
      POSTGRES_PASSWORD: ticket_password
      POSTGRES_DB: ticket_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticket_user -d ticket_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: ticket_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ticket.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres-db:
        condition: service_healthy
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: ticket-keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-db:5432/ticket_db
      KC_DB_USERNAME: ticket_user
      KC_DB_PASSWORD: ticket_password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8081
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_SPI_THEME_STATIC_MAX_AGE: "-1"
      KC_SPI_THEME_CACHE_THEMES: "false"
      KC_SPI_THEME_CACHE_TEMPLATES: "false"
    volumes:
      - ./keycloak-theme/destrova:/opt/keycloak/themes/destrova
    ports:
      - "8081:8080"
    depends_on:
      postgres-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && printf 'GET /realms/master HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 90s
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog
    container_name: mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

  jbpm-server:
    image: jboss/jbpm-server-full:7.61.0.Final
    container_name: ticket_jbpm
    ports:
      - "8180:8080"
    environment:
      JBPM_DB_DRIVER: postgres
      JBPM_DB_HOST: postgres-db
      JBPM_DB_PORT: "5432"
      JBPM_DB_NAME: ticket_db
      JBPM_DB_USER: ticket_user
      JBPM_DB_PASSWORD: ticket_password
    volumes:
      - jbpm_m2:/opt/jboss/.m2/repository
    depends_on:
      postgres-db:
        condition: service_healthy
    healthcheck:
      # KIE Server ayakta olması yetmez; BPMN deployment container STARTED olmalı (docs/jbpm-kalici-cozum-yol-haritasi.md)
      test: ["CMD-SHELL", "curl -fsS -u kieserver:kieserver1! http://localhost:8080/kie-server/services/rest/server/containers/destrova-ticket-process_1.0.0-SNAPSHOT | grep -q 'status=.STARTED' || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 20
      start_period: 300s
    restart: unless-stopped

  jbpm-kjar-build:
    build:
      context: ./jbpm-process
      dockerfile: Dockerfile.build
    container_name: jbpm_kjar_build
    volumes:
      - jbpm_m2:/root/.m2/repository
    restart: "no"

  jbpm-init:
    image: curlimages/curl:8.5.0
    container_name: jbpm_init
    depends_on:
      jbpm-server:
        condition: service_started
      jbpm-kjar-build:
        condition: service_completed_successfully
    volumes:
      - ./scripts/jbpm-deploy.sh:/jbpm-deploy.sh:ro
    entrypoint: ["/bin/sh", "/jbpm-deploy.sh"]
    restart: "no"

  jbpm-reconciler:
    image: curlimages/curl:8.5.0
    container_name: jbpm_reconciler
    depends_on:
      jbpm-server:
        condition: service_started
      jbpm-kjar-build:
        condition: service_completed_successfully
      jbpm-init:
        condition: service_completed_successfully
    volumes:
      - ./scripts/jbpm-deploy.sh:/jbpm-deploy.sh:ro
      - ./scripts/jbpm-reconciler.sh:/jbpm-reconciler.sh:ro
    entrypoint: ["/bin/sh", "/jbpm-reconciler.sh"]
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep -q Zookeeper"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.7.7
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
      - "9093:9093"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 8
      start_period: 40s
    restart: unless-stopped

  opensearch:
    image: opensearchproject/opensearch:2
    container_name: opensearch
    environment:
      discovery.type: single-node
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: S3cur3Pass!
      plugins.security.disabled: "true"
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib
    container_name: otel-collector
    command: ["--config", "/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      opensearch:
        condition: service_healthy
    restart: unless-stopped

  opensearch-init:
    image: curlimages/curl:8.5.0
    container_name: opensearch-init
    depends_on:
      opensearch:
        condition: service_healthy
    volumes:
      - ./backend/src/main/resources/opensearch/destrova-logs-mapping.json:/mapping.json:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        HTTP_CODE=$$(curl -sS -o /tmp/body -w "%{http_code}" -X PUT "http://opensearch:9200/destrova-logs" \
          -H "Content-Type: application/json" --data-binary @/mapping.json)
        if [ "$$HTTP_CODE" = "200" ] || [ "$$HTTP_CODE" = "400" ]; then exit 0; fi
        cat /tmp/body >&2
        exit 1
    restart: "no"

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2
    container_name: opensearch-dashboards
    depends_on:
      opensearch:
        condition: service_healthy
      opensearch-init:
        condition: service_completed_successfully
    environment:
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
      OPENSEARCH_HOSTS: "http://opensearch:9200"
    ports:
      - "5601:5601"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5601/app/login >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 90s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ticket_backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    volumes:
      - backend_uploads:/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres-db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      kafka:
        condition: service_healthy
      jbpm-init:
        condition: service_completed_successfully
      jbpm-server:
        condition: service_healthy
      mailhog:
        condition: service_started
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health 2>/dev/null | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 120s
    restart: unless-stopped

  log-consumer:
    build:
      context: ./log-consumer
      dockerfile: Dockerfile
    container_name: ticket_log_consumer
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      kafka:
        condition: service_healthy
      opensearch-init:
        condition: service_completed_successfully
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ticket_frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  opensearch-data:
  backend_uploads:
  jbpm_m2:
