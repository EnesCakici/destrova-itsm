spring:
  datasource:
    url: jdbc:postgresql://postgres-db:5432/ticket_db

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/ticket-realm
          jwk-set-uri: http://keycloak:8080/realms/ticket-realm/protocol/openid-connect/certs

  kafka:
    bootstrap-servers: kafka:9092

  mail:
    host: mailhog
    port: 1025

management:
  otlp:
    tracing:
      endpoint: http://otel-collector:4318/v1/traces

destrova:
  jbpm:
    base-url: http://jbpm-server:8080/kie-server/services/rest/server
  mail:
    frontend-base-url: http://localhost:5173
    product-name: DESTROVA
  keycloak-admin:
    # Internal Docker DNS (keycloak:8080) makes action-token emails point at :8080 (Spring Boot).
    # Reach Keycloak via the host-mapped port so mail links use localhost:8081.
    url: http://host.docker.internal:8081
