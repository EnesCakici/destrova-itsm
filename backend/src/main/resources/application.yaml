server:
  port: 8080

spring:
  jackson:
    deserialization:
      fail-on-unknown-properties: false

  datasource:
    url: jdbc:postgresql://localhost:5432/ticket_db
    username: ticket_user
    password: ticket_password
    driver-class-name: org.postgresql.Driver
    
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB


  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        transaction:
          jta:
            platform: org.hibernate.engine.transaction.jta.platform.internal.NoJtaPlatform
        format_sql: true
    show-sql: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/ticket-realm
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    table: flyway_schema_history

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  # Yerel geliştirme: MailHog (docker-compose mailhog). Web UI: http://localhost:8025
  # Harici SMTP örneği (örn. Gmail): host smtp.gmail.com, port 587, username/password ve
  # properties.mail.smtp.auth: true, starttls.enable: true; uygulama şifresi kullanın.
  mail:
    host: localhost
    port: 1025
    username: ""
    password: ""
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  file:
    name: destrova-debug.log # <--- 2. LOG DOSYASI ADI BURAYA EKLENDİ
  level:
    org.springframework: INFO
    com.ticket: DEBUG
    org.hibernate.SQL: WARN # <--- 3. HIBERNATE'İN ÇENESİ BURADA KAPATILDI

# Faz 0/1 — jBPM webhook projection & legacy workflow gates
destrova:
  workflow:
    shadow-projection: false  # false = webhook'lar DB projection yazar (Faz 1 live)
    legacy-put-enabled: false  # false = PUT ile status/priority/assignee/closureReason reddedilir; description güvenli
    poll:
      recommended-interval-ms: 500
      max-attempts: 20
      timeout-ms: 10000
  webhook:
    secret: destrova-webhook-dev-secret
  keycloak-admin:
    url: http://localhost:8081
    realm: ticket-realm
    admin-username: admin
    admin-password: admin