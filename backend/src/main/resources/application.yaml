server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ticket_db
    username: ticket_user
    password: ticket_password
    driver-class-name: org.postgresql.Driver
    
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB


  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/ticket-realm
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    table: flyway_schema_history

  kafka:
    bootstrap-servers: localhost:9092

  # Yerel geliştirme: MailHog (docker-compose mailhog). Web UI: http://localhost:8025
  # Harici SMTP örneği (örn. Gmail): host smtp.gmail.com, port 587, username/password ve
  # properties.mail.smtp.auth: true, starttls.enable: true; uygulama şifresi kullanın.
  mail:
    host: localhost
    port: 1025
    username: ""
    password: ""
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

logging:
  level:
    org.springframework: INFO
    com.ticket: DEBUG